name: aquacoach
description: "Application mobile de coaching natation personnalisé"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.1

  # Navigation
  go_router: ^14.6.3

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # HTTP
  dio: ^5.8.0+1

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage sécurisé (tokens OAuth)
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Graphiques
  fl_chart: ^0.70.2

  # Apple HealthKit
  health: ^12.2.0

  # Utils
  connectivity_plus: ^6.1.4
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
